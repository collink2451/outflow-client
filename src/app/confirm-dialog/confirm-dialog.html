<dialog #confirmModal class="modal" (close)="openChange.emit(false)">
  <div class="modal-box bg-base-100">
    <div class="sm:flex sm:items-start">
      <div
        class="mx-auto flex size-12 shrink-0 items-center justify-center rounded-full bg-error/20 sm:mx-0 sm:size-10"
      >
        <svg
          class="size-6 text-error"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 9v3.75m0 3.75h.008v.008H12v-.008zM10.29 3.86 1.82 18a2.25 2.25 0 0 0 1.93 3.375h16.5A2.25 2.25 0 0 0 22.18 18L13.71 3.86a2.25 2.25 0 0 0-3.42 0z"
          />
        </svg>
      </div>

      <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left">
        <h3 class="text-base font-semibold text-base-content">
          {{ title }}
        </h3>

        <div class="mt-2">
          <p class="text-sm text-base-content/60">
            {{ message }}
          </p>
        </div>
      </div>
    </div>

    <div class="modal-action sm:flex sm:flex-row-reverse">
      <button type="button" class="btn btn-error sm:ml-3" (click)="confirm()">
        {{ confirmText }}
      </button>

      <button type="button" class="btn" (click)="close()">
        {{ cancelText }}
      </button>
    </div>
  </div>

  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>
