<h1 class="text-2xl font-bold mb-4">Expenses</h1>

<div class="card bg-base-200 shadow p-4 max-w-4xl mx-auto">
  <div class="flex justify-between items-center mb-3">
    <button class="btn btn-secondary btn-sm" (click)="openCategoriesModal()">
      Manage Categories
    </button>
    <div class="flex items-center gap-2">
      <span class="text-sm text-base-content/60">{{ expenses().length }} expenses</span>
      <button class="btn btn-primary btn-sm" (click)="addRow()">+ Add Expense</button>
    </div>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-8">
      <span class="loading loading-spinner loading-md"></span>
    </div>
  } @else {
    <div class="overflow-x-auto rounded-box border border-base-300">
      <table class="table table-xs">
        <colgroup>
          <col class="w-40" />
          <col class="w-44" />
          <col />
          <col class="w-36" />
          <col class="w-12" />
        </colgroup>
        <thead>
          <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Description</th>
            <th class="text-right">Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          @for (row of expenses(); track row) {
            <tr class="even:bg-base-200 odd:bg-base-300" [class.opacity-50]="row.saving">
              <td>
                <input
                  type="date"
                  class="input input-md w-full"
                  [(ngModel)]="row.date"
                  (blur)="save(row)"
                />
              </td>
              <td>
                <select
                  class="select select-md w-full"
                  [(ngModel)]="row.expenseCategoryId"
                  (change)="save(row)"
                >
                  <option [ngValue]="null" disabled>—</option>
                  @for (cat of categories(); track cat.expenseCategoryId) {
                    <option [ngValue]="cat.expenseCategoryId">{{ cat.name }}</option>
                  }
                </select>
              </td>
              <td>
                <input
                  type="text"
                  class="input input-md w-full"
                  [(ngModel)]="row.description"
                  (blur)="save(row)"
                />
              </td>
              <td>
                <input
                  type="number"
                  step="0.01"
                  min="0"
                  class="input input-md w-full text-right tabular-nums"
                  [(ngModel)]="row.amount"
                  (blur)="save(row)"
                />
              </td>
              <td>
                <button class="btn btn-error btn-md" (click)="delete(row)">✕</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>

<dialog #categoriesModal class="modal">
  <div class="modal-box">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold">Manage Categories</h3>
      <form method="dialog">
        <button class="btn btn-md btn-circle">✕</button>
      </form>
    </div>
    <div class="flex flex-col gap-2">
      @for (row of editableCategories(); track row) {
        <div class="flex gap-2 items-center" [class.opacity-50]="row.saving">
          <input
            type="text"
            class="input input-sm flex-1"
            placeholder="Category name"
            [(ngModel)]="row.name"
            (blur)="saveCategory(row)"
          />
          <button class="btn btn-ghost btn-sm text-error" (click)="deleteCategory(row)">✕</button>
        </div>
      }
    </div>
    <button class="btn btn-ghost btn-sm mt-3 w-full" (click)="addCategoryRow()">
      + Add Category
    </button>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>
