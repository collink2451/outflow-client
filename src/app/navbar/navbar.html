<div class="navbar bg-base-200 border-b border-base-300 px-4">
  <div class="navbar-start">
    <div class="md:hidden relative">
      <button class="btn btn-ghost btn-circle" (click)="menuOpen.set(!menuOpen())">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-5 h-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>
      @if (menuOpen()) {
        <ul
          class="absolute left-0 top-full mt-1 menu bg-base-200 rounded-box z-10 w-48 p-2 shadow border border-base-300"
        >
          <ng-container *ngTemplateOutlet="navLinks; context: { mobile: true }" />
        </ul>
      }
    </div>
    <a routerLink="/" class="text-xl font-bold text-primary ml-1">Outflow</a>
  </div>

  <div class="navbar-center hidden md:flex">
    <ul class="menu menu-horizontal gap-1">
      <ng-container *ngTemplateOutlet="navLinks; context: { mobile: false }" />
    </ul>
  </div>

  <div class="navbar-end gap-2">
    <label class="swap swap-rotate btn btn-ghost btn-circle">
      <input type="checkbox" [checked]="isDark()" (change)="toggleTheme()" />
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="swap-off w-5 h-5 fill-current"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2"></path>
        <path d="M12 20v2"></path>
        <path d="M4.93 4.93l1.41 1.41"></path>
        <path d="M17.66 17.66l1.41 1.41"></path>
        <path d="M2 12h2"></path>
        <path d="M20 12h2"></path>
        <path d="M4.93 19.07l1.41-1.41"></path>
        <path d="M17.66 6.34l1.41-1.41"></path>
      </svg>
      <svg
        class="swap-on w-5 h-5 fill-current"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
      >
        <path
          d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z"
        />
      </svg>
    </label>

    @if (auth.user()) {
      <a href="/auth/logout" class="btn btn-primary btn-sm">Logout</a>
    } @else {
      <a href="/auth/login" class="btn btn-primary btn-sm">Login</a>
      <a href="/auth/demo" class="btn btn-secondary btn-sm">View Demo</a>
    }
  </div>
</div>

<ng-template #navLinks let-mobile="mobile">
  <li>
    <a
      routerLink="/dashboard"
      routerLinkActive="font-semibold text-primary"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="mobile && menuOpen.set(false)"
      >Dashboard</a
    >
  </li>
  <li>
    <a
      routerLink="/expenses"
      routerLinkActive="font-semibold text-primary"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="mobile && menuOpen.set(false)"
      >Expenses</a
    >
  </li>
  <li>
    <a
      routerLink="/pay-periods"
      routerLinkActive="font-semibold text-primary"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="mobile && menuOpen.set(false)"
      >Pay Periods</a
    >
  </li>
</ng-template>
